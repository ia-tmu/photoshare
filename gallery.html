<!doctype html>
<html lang="ja">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>写真ギャラリー</title>
  <meta name="description" content="共有された写真を会場スクリーン向けに表示するギャラリーページです。" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
  <main class="gallery-shell">
    <header class="gallery-header">
      <div>
        <p class="eyebrow">Shared Photos</p>
        <h1>写真ギャラリー</h1>
      </div>

      <label class="sort-control" for="sort-select">
        <span>並び順</span>
        <select id="sort-select" name="sort">
          <option value="newest" selected>新しい順</option>
          <option value="oldest">古い順</option>
          <option value="name_asc">ファイル名 A-Z</option>
          <option value="name_desc">ファイル名 Z-A</option>
        </select>
      </label>
    </header>

    <p id="gallery-status" class="gallery-status" role="status" aria-live="polite">読み込み中です。</p>
    <section id="photo-grid" class="photo-grid" aria-label="共有写真一覧"></section>
    <div id="gallery-sentinel" class="gallery-sentinel" aria-hidden="true">
      <span></span>
    </div>
  </main>

  <script src="assets/js/gallery.js" defer></script>
</body>

</html>
